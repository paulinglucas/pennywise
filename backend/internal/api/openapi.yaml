openapi: 3.0.3
info:
  title: Pennywise API
  version: 1.0.0
  description: Self-hosted personal finance dashboard API

servers:
  - url: /api/v1

security:
  - cookieAuth: []

paths:
  /auth/login:
    post:
      operationId: postAuthLogin
      tags: [auth]
      security: []
      summary: Authenticate and receive JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/logout:
    post:
      operationId: postAuthLogout
      tags: [auth]
      summary: Clear auth cookie
      responses:
        "204":
          description: Logged out
        "401":
          $ref: "#/components/responses/Unauthorized"

  /auth/me:
    get:
      operationId: getAuthMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /accounts:
    get:
      operationId: listAccounts
      tags: [accounts]
      summary: List accounts for current user
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Account list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAccount
      tags: [accounts]
      summary: Create an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAccountRequest"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /accounts/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getAccount
      tags: [accounts]
      summary: Get account by ID
      responses:
        "200":
          description: Account detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAccount
      tags: [accounts]
      summary: Update an account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAccountRequest"
      responses:
        "200":
          description: Account updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAccount
      tags: [accounts]
      summary: Soft delete an account
      responses:
        "204":
          description: Account deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions with filtering and pagination
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
        - name: account_id
          in: query
          schema:
            type: string
            format: uuid
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            $ref: "#/components/schemas/TransactionType"
        - name: date_from
          in: query
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          schema:
            type: string
            format: date
        - name: amount_min
          in: query
          schema:
            type: number
            minimum: 0
        - name: amount_max
          in: query
          schema:
            type: number
            minimum: 0
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated tag names
        - name: search
          in: query
          schema:
            type: string
        - name: group_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionRequest"
      responses:
        "201":
          description: Transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transactions/import:
    post:
      operationId: importTransactions
      tags: [transactions]
      summary: Bulk import transactions from CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - account_id
              properties:
                file:
                  type: string
                  format: binary
                account_id:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Transactions imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transactions/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get transaction by ID
      responses:
        "200":
          description: Transaction detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTransaction
      tags: [transactions]
      summary: Update a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionRequest"
      responses:
        "200":
          description: Transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Soft delete a transaction
      responses:
        "204":
          description: Transaction deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List distinct categories used by the current user
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transaction-groups:
    get:
      operationId: listTransactionGroups
      tags: [transaction-groups]
      summary: List transaction groups for current user
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Transaction group list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionGroupListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createTransactionGroup
      tags: [transaction-groups]
      summary: Create a transaction group with member transactions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionGroupRequest"
      responses:
        "201":
          description: Transaction group created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionGroupResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /transaction-groups/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getTransactionGroup
      tags: [transaction-groups]
      summary: Get transaction group with members
      responses:
        "200":
          description: Transaction group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionGroupResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateTransactionGroup
      tags: [transaction-groups]
      summary: Update a transaction group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTransactionGroupRequest"
      responses:
        "200":
          description: Transaction group updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionGroupResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteTransactionGroup
      tags: [transaction-groups]
      summary: Soft delete a transaction group and its member transactions
      responses:
        "204":
          description: Transaction group deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /assets:
    get:
      operationId: listAssets
      tags: [assets]
      summary: List assets with portfolio summary
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Asset list with portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createAsset
      tags: [assets]
      summary: Create an asset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Asset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /assets/allocation:
    get:
      operationId: getAssetAllocation
      tags: [assets]
      summary: Portfolio allocation breakdown over time
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y, all]
            default: 6m
      responses:
        "200":
          description: Allocation data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AllocationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /assets/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getAsset
      tags: [assets]
      summary: Get asset with value history
      responses:
        "200":
          description: Asset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateAsset
      tags: [assets]
      summary: Update asset value and metadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Asset updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteAsset
      tags: [assets]
      summary: Soft delete an asset
      responses:
        "204":
          description: Asset deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /assets/{id}/history:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getAssetHistory
      tags: [assets]
      summary: Get value history time series
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1m, 3m, 6m, 1y, all]
            default: 6m
      responses:
        "200":
          description: Asset history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List goals ordered by priority
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Goal list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoalRequest"
      responses:
        "201":
          description: Goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /goals/reorder:
    put:
      operationId: reorderGoals
      tags: [goals]
      summary: Update priority rankings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalReorderRequest"
      responses:
        "200":
          description: Goals reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalListResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /goals/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get goal with computed projections
      responses:
        "200":
          description: Goal detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      operationId: updateGoal
      tags: [goals]
      summary: Update a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGoalRequest"
      responses:
        "200":
          description: Goal updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteGoal
      tags: [goals]
      summary: Soft delete a goal
      responses:
        "204":
          description: Goal deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /goals/{id}/contributions:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      operationId: listGoalContributions
      tags: [goals]
      summary: List contributions for a goal
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Contribution list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalContributionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createGoalContribution
      tags: [goals]
      summary: Record a contribution toward a goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGoalContributionRequest"
      responses:
        "201":
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoalContributionResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /goals/{id}/contributions/{contribution_id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
      - name: contribution_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      operationId: deleteGoalContribution
      tags: [goals]
      summary: Delete a contribution and reverse its effect on the goal
      responses:
        "204":
          description: Contribution deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /recurring:
    get:
      operationId: listRecurring
      tags: [recurring]
      summary: List recurring transactions
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Recurring transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRecurring
      tags: [recurring]
      summary: Create a recurring transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRecurringRequest"
      responses:
        "201":
          description: Recurring transaction created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /recurring/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    put:
      operationId: updateRecurring
      tags: [recurring]
      summary: Update a recurring transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRecurringRequest"
      responses:
        "200":
          description: Recurring transaction updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecurringResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRecurring
      tags: [recurring]
      summary: Deactivate a recurring transaction
      responses:
        "204":
          description: Recurring transaction deactivated
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [dashboard]
      summary: Aggregated dashboard data
      parameters:
        - name: spending_period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d, 1y]
            default: 30d
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/net-worth-history:
    get:
      operationId: getNetWorthHistory
      tags: [dashboard]
      summary: Net worth time series
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [1m, 1y, 5y, all]
            default: 1y
      responses:
        "200":
          description: Net worth history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetWorthHistoryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /projections:
    post:
      operationId: computeProjection
      tags: [projections]
      summary: Compute financial projection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectionRequest"
      responses:
        "200":
          description: Projection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectionResponse"
        "400":
          $ref: "#/components/responses/ValidationFailed"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List unread alerts
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PerPageParam"
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /alerts/{id}/read:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    put:
      operationId: markAlertRead
      tags: [alerts]
      summary: Mark alert as read
      responses:
        "204":
          description: Alert marked as read
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /export:
    get:
      operationId: exportData
      tags: [export]
      summary: Full JSON dump of all user data
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /export/csv:
    get:
      operationId: exportCsv
      tags: [export]
      summary: CSV dump of transactions
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /health:
    get:
      operationId: getHealth
      tags: [health]
      security: []
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "503":
          description: Unhealthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /telemetry/vitals:
    post:
      operationId: postVitals
      tags: [telemetry]
      security: []
      summary: Frontend Web Vitals ingestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VitalsRequest"
      responses:
        "204":
          description: Vitals recorded

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
