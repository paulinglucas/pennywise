            $ref: "#/components/schemas/GoalResponse"
        recurring_transactions:
          type: array
          items:
            $ref: "#/components/schemas/RecurringResponse"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertResponse"
        exported_at:
          type: string
          format: date-time

    HealthResponse:
      type: object
      required:
        - status
        - version
        - uptime_seconds
        - database
        - timestamp
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
        version:
          type: string
        uptime_seconds:
          type: integer
        database:
          type: string
          enum:
            - connected
            - disconnected
        timestamp:
          type: string
          format: date-time

    VitalsRequest:
      type: object
      required:
        - metrics
      properties:
        metrics:
          type: array
          items:
            type: object
            required:
              - name
              - value
            properties:
              name:
                type: string
              value:
                type: number
              id:
                type: string
