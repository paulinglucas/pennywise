name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
      - run: cd frontend && npm ci
      - run: |
          oapi-codegen -package api -generate types,chi-server api/openapi.yaml > backend/internal/api/generated.go
          cd frontend && npx openapi-typescript ../api/openapi.yaml -o src/api/generated.ts
      - run: git diff --exit-code backend/internal/api/generated.go frontend/src/api/generated.ts

  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1
          working-directory: backend

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - run: cd frontend && npx eslint . --max-warnings 0
      - run: cd frontend && npx prettier --check .
      - run: cd frontend && npx tsc --noEmit

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Run tests with coverage
        run: |
          cd backend
          go test ./... -race -coverprofile=coverage.out
          grep -v '/api/generated\.go\|/api/stub\.go\|cmd/server/' coverage.out > coverage.filtered.out
          go tool cover -func=coverage.filtered.out
          total=$(go tool cover -func=coverage.filtered.out | grep '^total:' | awk '{print $NF}' | tr -d '%')
          threshold=80
          result=$(echo "$total < $threshold" | bc)
          if [ "$result" -eq 1 ]; then
            echo "FAIL: coverage ${total}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "Coverage ${total}% meets threshold ${threshold}%"

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd frontend && npm ci
      - name: Run tests with coverage threshold
        run: |
          cd frontend
          npx vitest run --coverage
          COVERAGE=$(npx vitest run --coverage 2>&1 | grep "^All files" | awk '{print $4}')
          threshold=60
          result=$(echo "$COVERAGE < $threshold" | bc)
          if [ "$result" -eq 1 ]; then
            echo "FAIL: coverage ${COVERAGE}% is below threshold ${threshold}%"
            exit 1
          fi
          echo "Coverage ${COVERAGE}% meets threshold ${threshold}%"

  build:
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: cd backend && CGO_ENABLED=0 go build -o ../bin/pennywise cmd/server/main.go
      - run: cd frontend && npm ci && npm run build
